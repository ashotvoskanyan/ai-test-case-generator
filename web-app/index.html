<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Test Case Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>AI Test Case Generator</h1>
      <p>
        Paste a user story or requirement and generate structured QA test cases.
      </p>
    </section>

    <section class="generator">
      <label for="workflow">Workflow</label>

      <select id="workflow">
        <option value="test-cases">Test Cases</option>
        <option value="bug-report">Bug Report</option>
        <option value="api-tests">API Tests</option>
      </select>
      
      <label for="requirement">Input</label>
      
      <textarea
        id="requirement"
        placeholder="Paste a user story, bug description, or API endpoint description here."
      ></textarea>
      
      <button id="generateButton">Generate QA Output</button>
    </section>

    <section class="output">
      <h2>Generated QA Output</h2>
      <pre id="result">Your generated QA output will appear here.</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
